<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Doce Fatia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --border: #2e2a22;
    --accent-yellow: #f5c842;
    --accent-orange: #e8824a;
    --text: #f0ece4;
    --text-muted: #7a7468;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    background-image: radial-gradient(ellipse at 50% -10%, #2a1f08 0%, transparent 60%);
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 24px rgba(245,200,66,0.25));
  }

  .logo-nome {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    color: var(--accent-yellow);
    letter-spacing: -1px;
    line-height: 1;
  }

  .logo-sub {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .cards {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 20px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }

  .card:active {
    transform: scale(0.97);
  }

  .card-venda:hover  { border-color: var(--accent-yellow); }
  .card-compra:hover { border-color: var(--accent-orange); }

  .card-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }

  .card-venda  .card-icon { background: rgba(245,200,66,0.1); }
  .card-compra .card-icon { background: rgba(232,130,74,0.1); }

  .card-info { flex: 1; }

  .card-titulo {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    margin-bottom: 3px;
  }

  .card-venda  .card-titulo { color: var(--accent-yellow); }
  .card-compra .card-titulo { color: var(--accent-orange); }

  .card-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .card-arrow {
    font-size: 1.2rem;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .footer {
    margin-top: 40px;
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    opacity: 0.5;
  }
</style>
</head>
<body>

  <div class="logo-wrap">
    <span class="logo-icon">🍰</span>
    <div class="logo-nome">Doce Fatia</div>
    <div class="logo-sub">Sistema de Gestão</div>
  </div>

  <div class="cards">

    <a class="card card-venda" href="venda.html">
      <div class="card-icon">🏪</div>
      <div class="card-info">
        <div class="card-titulo">Lançar Venda</div>
        <div class="card-desc">Balcão ou delivery</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="card card-compra" href="compra.html">
      <div class="card-icon">🛒</div>
      <div class="card-info">
        <div class="card-titulo">Registrar Compra</div>
        <div class="card-desc">Saídas e mercadoria</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

  </div>

  <div class="footer">Doce Fatia © 2025</div>

</body>
</html>
